<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>教材在庫カウント Pro</title>
  <style>
    /* CSSは前回同様のため省略（変数値などは維持） */
    :root { --bg: #f2f4f7; --card: #ffffff; --text: #1a1c1e; --sub: #5f6368; --line: #dcdfe4; --primary: #1a73e8; --primary-light: #e8f0fe; --danger: #d93025; --chip: #f1f3f4; }
    body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); padding-bottom: 100px; }
    header { position: sticky; top: 0; z-index: 100; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 12px 16px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; max-width: 700px; margin: 0 auto; }
    .toolbar-container { max-width: 700px; margin: 8px auto 0; }
    .toolbar input { width: 100%; padding: 12px; border: 2px solid var(--line); border-radius: 10px; font-size: 16px; }
    .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 12px 0 4px; scrollbar-width: none; }
    .f-chip { white-space: nowrap; padding: 8px 16px; border-radius: 20px; background: #fff; border: 1px solid var(--line); font-size: 13px; }
    .f-chip.active { background: var(--primary); color: #fff; }
    .item { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 16px; margin: 12px auto; display: flex; justify-content: space-between; align-items: center; max-width: 700px; }
    .item.has-qty { background: var(--primary-light); border-color: var(--primary); }
    .chip { padding: 3px 8px; font-size: 10px; border-radius: 6px; background: var(--chip); font-weight: bold; }
    .chip.subject { background: #e6f4ea; color: #137333; }
    .item-name { font-size: 16px; font-weight: bold; margin-top: 4px; }
    .counter { display: flex; align-items: center; gap: 12px; }
    .counter button { width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--line); background: #fff; font-size: 20px; }
    .qty { font-size: 20px; font-weight: 800; min-width: 30px; text-align: center; }
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--line); padding: 16px; }
    .btn-main { padding: 12px 24px; border-radius: 10px; border: none; background: var(--primary); color: #fff; font-weight: bold; }
    #sendBtn.dirty::after { content: "●"; color: var(--danger); margin-left: 5px; }
    .status-line { font-size: 11px; text-align: right; color: var(--sub); padding: 0 16px; }
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <h2 style="margin:0; font-size:18px;">在庫管理</h2>
    <div id="roomLabel" style="font-weight:bold; color:var(--primary);"></div>
  </div>
  <div class="toolbar-container">
    <input id="searchInput" type="search" placeholder="教材名・コード検索..." />
    <div id="filterArea" class="filter-scroll"></div>
  </div>
</header>
<main>
  <div id="statusLine" class="status-line"></div>
  <div id="list"></div>
</main>
<div class="bottom-bar">
  <div style="max-width:700px; margin:0 auto; display:flex; justify-content:space-between; align-items:center;">
    <div style="font-size:14px;">変更 <span id="changeCount">0</span>件 / 合計 <span id="totalQty">0</span>部</div>
    <button id="sendBtn" class="btn-main">送信する</button>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
