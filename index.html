<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>在庫管理システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-panel">
    <div class="top-panel-inner">
      <div class="head-main">
        <div class="title-wrap">
          <h1 class="title">在庫管理</h1>
          <div id="roomLabel" class="room-badge"></div>
        </div>

        <div class="head-actions">
          <button id="toolMenuBtn" class="btn-subtle" type="button">ツール</button>
        </div>
      </div>

      <div class="toolbar-card">
        <div class="search-wrap">
          <input
            id="searchInput"
            class="search-input"
            type="search"
            placeholder="教材名・出版社で検索..."
            autocomplete="off"
          />
          <div id="filterArea" class="filter-scroll"></div>
        </div>

        <div id="metaPanel" class="meta-panel always-open">
          <div id="statusLine" class="status-line"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="list-wrap">
      <div id="list"></div>
    </section>
  </main>

  <div class="bottom-bar">
    <div class="bottom-inner compact">
      <div class="summary-grid">
        <div class="summary-item">
          <span class="summary-label">合計部数</span>
          <span id="totalQty" class="summary-value num">0</span>
          <span class="summary-unit">部</span>
        </div>
      </div>

      <div class="bottom-actions">
        <div class="save-meta">
          <span class="save-meta-label">最終更新</span>
          <span id="updatedAt" class="save-meta-value num">-</span>
        </div>

        <button id="sendBtn" class="btn-main" disabled type="button">保存する</button>
      </div>
    </div>
  </div>

  <input id="importFileInput" type="file" accept=".json,application/json" hidden />

  <dialog id="toolMenuDialog" class="menu-dialog">
    <div class="menu-list">
      <button id="menuAddCustomBtn" class="menu-item menu-item-primary" type="button">＋ マスタ外教材を追加</button>
      <button id="exportJsonBtn" class="menu-item" type="button">JSON出力</button>
      <button id="exportCsvBtn" class="menu-item" type="button">CSV出力</button>
      <button id="importJsonBtn" class="menu-item" type="button">JSON取込</button>
      <button id="closeToolMenuBtn" class="menu-item muted" type="button">閉じる</button>
    </div>
  </dialog>

  <dialog id="customItemDialog">
    <div class="modal-head">
      <h2 class="modal-title">マスタ外教材を追加</h2>
    </div>

    <form id="customItemForm" method="dialog">
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-row">
            <label for="customName">教材名 <span style="color:#dc2626;">※必須</span></label>
            <input id="customName" class="input" type="text" placeholder="例：サンプル問題集 社会 中3 / よくわかる高校数学" required />
          </div>

          <div class="form-row">
            <label for="customPublisher">出版社</label>
            <input id="customPublisher" class="input" type="text" placeholder="（任意）※教材名から書籍特定が難しそうな場合などにご記入ください" />
          </div>

          <div class="form-row">
            <label for="customEdition">版・準拠・補足情報</label>
            <input id="customEdition" class="input" type="text" placeholder="例：改訂版 / 東書 / 20XX年度版 など" />
          </div>

          <div class="form-row">
            <label for="customQty">数量</label>
            <input id="customQty" class="input" type="number" min="0" value="1" />
          </div>
        </div>
      </div>

      <div class="modal-foot">
        <button id="cancelCustomBtn" class="btn-ghost" type="button">閉じる</button>
        <button id="saveCustomBtn" class="btn-success" type="submit">追加する</button>
      </div>
    </form>
  </dialog>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
