<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title>教材在庫管理 サンプル</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-panel">
      <div class="top-panel-inner">
        <div class="head-main">
          <div class="title-wrap">
            <h1 class="title">教材在庫管理</h1>
            <div id="roomLabel" class="room-badge">サンプル</div>
          </div>

          <div class="head-actions">
            <button
              id="toolMenuBtnAddCustom"
              class="btn-subtle btn-subtle-add"
              type="button"
            >
              未登録教材を追加
            </button>
            <button
              id="toolMenuBtn"
              class="btn-subtle btn-subtle-other"
              type="button"
              aria-label="メニューを開く"
            >
              ...
            </button>
          </div>
        </div>

        <div class="toolbar-card">
          <div class="access-bar">
            <div id="infoMessage" class="info-message">
              サンプルページです。Firestoreを含め、外部とは通信しません。
            </div>
            <div id="errorMessage" class="error-message" hidden></div>
          </div>

          <div class="search-wrap">
            <div class="search-main-row">
              <div class="search-field">
                <input
                  id="searchInput"
                  class="search-input"
                  type="search"
                  placeholder="教材名・出版社で検索..."
                  autocomplete="off"
                />
                <button
                  id="searchClearBtn"
                  class="search-clear-btn"
                  type="button"
                  aria-label="検索文字をクリア"
                  hidden
                >
                  x
                </button>
              </div>
              <button
                id="inputOnlyToggle"
                class="input-only-toggle"
                type="button"
                aria-pressed="false"
              >
                入力済みのみ
              </button>
            </div>
            <div class="filter-layout">
              <div
                id="filterArea"
                class="filter-scroll"
                role="group"
                aria-label="教材フィルタ"
              ></div>
            </div>
          </div>

          <div id="metaPanel" class="meta-panel always-open"></div>
        </div>
      </div>
    </header>

    <main class="shell">
      <section class="list-wrap">
        <div id="list"></div>
      </section>
    </main>

    <div class="bottom-bar">
      <div class="bottom-inner compact">
        <div class="summary-grid">
          <div class="summary-item">
            <span class="summary-label">合計冊数</span>
            <span id="totalQty" class="summary-value num">0</span>
            <span class="summary-unit">冊</span>
          </div>
          <div class="summary-item summary-item-status">
            <span id="dirtyCount" class="summary-label"></span>
          </div>
        </div>

        <div class="bottom-actions">
          <button id="sendBtn" class="btn-main" disabled type="button">
            保存する
          </button>
        </div>
      </div>
    </div>

    <dialog id="toolMenuDialog" class="menu-dialog">
      <div class="modal-head">
        <h2 class="modal-title">メニュー</h2>
        <button
          id="closeToolMenuBtn"
          class="dialog-close-btn"
          type="button"
          aria-label="閉じる"
        >
          x
        </button>
      </div>
      <div class="menu-list">
        <button
          id="completeInventoryBtn"
          class="menu-item menu-item-primary"
          type="button"
        >
          棚卸結果を本部に送信する
        </button>
        <button id="viewInputtedListBtn" class="menu-item" type="button">
          入力内容を確認
        </button>
        <button id="exportCsvBtn" class="menu-item" type="button">
          CSV出力
        </button>
        <section class="menu-group" aria-labelledby="backupGroupTitle">
          <div class="menu-group-head">
            <h3 id="backupGroupTitle" class="menu-group-title">バックアップ</h3>
          </div>
          <div class="menu-row">
            <button id="exportJsonBtn" class="menu-item" type="button">
              保存
            </button>
            <button id="importJsonBtn" class="menu-item" type="button">
              取込
            </button>
          </div>
        </section>
        <p class="menu-note">
          サンプルページのため、保存・送信・出力・取込は実行されません。
        </p>
      </div>
    </dialog>

    <dialog id="inputtedItemsDialog" class="menu-dialog review-dialog">
      <div class="modal-head">
        <h2 class="modal-title">入力済み教材一覧</h2>
        <button
          id="closeInputtedItemsBtn"
          class="dialog-close-btn"
          type="button"
          aria-label="閉じる"
        >
          x
        </button>
      </div>
      <div class="modal-body">
        <div id="inputtedItemsSummary" class="info-message"></div>
        <div id="inputtedItemsList" class="review-list"></div>
      </div>
    </dialog>

    <dialog id="customItemDialog">
      <div class="modal-head">
        <h2 id="customDialogTitle" class="modal-title">未登録教材を追加</h2>
        <button
          id="closeCustomDialogBtn"
          class="dialog-close-btn"
          type="button"
          aria-label="閉じる"
        >
          x
        </button>
      </div>

      <form id="customItemForm" method="dialog">
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-row">
              <label for="customName">
                教材名 <span style="color: #dc2626">*</span>
              </label>
              <input
                id="customName"
                class="input"
                type="text"
                placeholder="例: サンプル教材"
                required
              />
            </div>

            <div class="form-row">
              <label for="customEdition">版・備考</label>
              <input
                id="customEdition"
                class="input"
                type="text"
                placeholder="例: 2026年度版"
              />
            </div>

            <div class="form-row">
              <label for="customPublisher">出版社</label>
              <input
                id="customPublisher"
                class="input"
                type="text"
                placeholder="例: サンプル出版"
              />
            </div>

            <div class="form-row">
              <label>数量</label>
              <div class="qty-box custom-qty-box">
                <button
                  id="customQtyMinus"
                  type="button"
                  class="qty-btn minus"
                  aria-label="減らす"
                >
                  -
                </button>
                <input
                  id="customQtyInput"
                  class="qty-input num"
                  type="number"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  min="0"
                  step="1"
                  value="0"
                  aria-label="数量"
                />
                <button
                  id="customQtyPlus"
                  type="button"
                  class="qty-btn plus"
                  aria-label="増やす"
                >
                  +
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="modal-foot">
          <button
            id="deleteCustomBtn"
            class="btn-ghost danger"
            type="button"
            hidden
          >
            削除する
          </button>
          <button id="cancelCustomBtn" class="btn-ghost" type="button">
            キャンセル
          </button>
          <button id="saveCustomBtn" class="btn-success" type="submit">
            追加する
          </button>
        </div>
      </form>
    </dialog>

    <script src="data.js"></script>
    <script src="sample-app.js"></script>
  </body>
</html>
