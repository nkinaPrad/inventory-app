<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>在庫管理システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-panel">
    <div class="top-panel-inner">
      <div class="head-main">
        <h1 class="title">在庫管理</h1>
        <div id="roomLabel" class="room-badge"></div>
        <button id="metaToggleBtn" class="btn-subtle" type="button">詳細を表示</button>
      </div>

      <div class="toolbar-card">
        <div class="search-wrap">
          <input
            id="searchInput"
            class="search-input"
            type="search"
            placeholder="教材名・出版社・コードで検索..."
            autocomplete="off"
          />
          <div id="filterArea" class="filter-scroll"></div>
        </div>

        <div id="metaPanel" class="meta-panel">
          <div class="meta-row">
            <div class="meta-item">
              <span class="meta-label">取得件数</span>
              <span id="totalCount" class="meta-value num">0件</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">表示件数</span>
              <span id="visibleCount" class="meta-value num">0件</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">最終更新日時</span>
              <span id="updatedAt" class="meta-value num">-</span>
            </div>
          </div>

          <div id="statusLine" class="status-line"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="list-wrap">
      <div id="list"></div>
    </section>
  </main>

  <div class="bottom-bar">
    <div class="bottom-inner">
      <div class="summary-grid">
        <div class="summary-item">
          <span class="summary-label">変更件数</span>
          <span id="changeCount" class="summary-value num">0</span>
          <span class="summary-unit">件</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">合計部数</span>
          <span id="totalQty" class="summary-value num">0</span>
          <span class="summary-unit">部</span>
        </div>
      </div>

      <div class="btn-row">
        <button id="addCustomBtn" class="btn-success" type="button">教材追加</button>
        <button id="exportJsonBtn" class="btn-ghost" type="button">JSON出力</button>
        <button id="exportCsvBtn" class="btn-ghost" type="button">CSV出力</button>
        <button id="importJsonBtn" class="btn-ghost" type="button">JSON取込</button>
        <button id="sendBtn" class="btn-main" disabled type="button">保存する</button>
      </div>
    </div>
  </div>

  <input id="importFileInput" type="file" accept=".json,application/json" hidden />

  <dialog id="customItemDialog">
    <div class="modal-head">
      <h2 class="modal-title">マスタ外教材を追加</h2>
    </div>

    <form id="customItemForm" method="dialog">
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-row">
            <label for="customName">教材名 <span style="color:#dc2626;">※必須</span></label>
            <input id="customName" class="input" type="text" required />
          </div>

          <div class="form-row">
            <label for="customCategory">カテゴリ</label>
            <input id="customCategory" class="input" type="text" placeholder="例：国語 / 数学 / テスト / その他" />
          </div>

          <div class="form-row">
            <label for="customSubject">教科</label>
            <input id="customSubject" class="input" type="text" placeholder="任意" />
          </div>

          <div class="form-row">
            <label for="customPublisher">出版社</label>
            <input id="customPublisher" class="input" type="text" placeholder="任意" />
          </div>

          <div class="form-row">
            <label for="customEdition">版・準拠情報</label>
            <input id="customEdition" class="input" type="text" placeholder="任意" />
          </div>

          <div class="form-row">
            <label for="customQty">数量</label>
            <input id="customQty" class="input" type="number" min="0" value="1" />
          </div>
        </div>
      </div>

      <div class="modal-foot">
        <button id="cancelCustomBtn" class="btn-ghost" type="button">閉じる</button>
        <button id="saveCustomBtn" class="btn-success" type="submit">追加する</button>
      </div>
    </form>
  </dialog>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
