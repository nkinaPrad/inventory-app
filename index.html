<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>教材在庫カウント Pro</title>
  <style>
    /* * デザインシステム（変数定義）
     * 色や余白を一箇所で管理することで、テーマ変更を容易にしています。
     */
    :root {
      --bg: #f2f4f7;
      --card: #ffffff;
      --text: #1a1c1e;
      --sub: #5f6368;
      --line: #dcdfe4;
      --primary: #1a73e8;
      --primary-light: #e8f0fe;
      --danger: #d93025;
      --chip-bg: #f1f3f4;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      --shadow-bottom: 0 -4px 12px rgba(0, 0, 0, 0.05);
      --radius: 16px;
      --maxw: 720px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent; /* タップ時の青い枠を消す（スマホ用） */
      padding-bottom: 120px; /* 下部固定バーに隠れないよう余白を確保 */
    }

    /* ヘッダー：画面上部に固定 */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      box-shadow: var(--shadow);
      padding: 12px 16px 10px;
    }

    .header-inner {
      max-width: var(--maxw);
      margin: 0 auto;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .room-label {
      font-weight: 800;
      color: var(--primary);
      white-space: nowrap;
      font-size: 15px;
    }

    /* 検索バーとフィルタチップ */
    .toolbar {
      margin-top: 10px;
    }

    .search-input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--line);
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    .search-input:focus {
      border-color: var(--primary);
    }

    /* 横スクロール可能なカテゴリフィルタ */
    .filter-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 0 2px;
      scrollbar-width: none; /* Firefox用 */
    }

    .filter-scroll::-webkit-scrollbar {
      display: none; /* Chrome, Safari用 */
    }

    .f-chip {
      flex: 0 0 auto;
      white-space: nowrap;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 13px;
      cursor: pointer;
    }

    .f-chip.active {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    /* ステータス表示（同期中、最終更新など） */
    .status-line-wrap {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 6px 16px 0;
    }

    .status-line {
      min-height: 14px;
      font-size: 11px;
      color: var(--sub);
      text-align: right;
    }

    /* メインリストエリア */
    main {
      padding: 8px 12px 0;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      margin: 12px 0;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    /* 数量が入っているアイテムを強調 */
    .item.has-qty {
      background: var(--primary-light);
      border-color: var(--primary);
    }

    .item-info {
      min-width: 0;
      flex: 1 1 auto;
    }

    /* カテゴリや出版社のラベルタグ */
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      margin-right: 4px;
    }

    .chip.cat { background: #e8f0fe; color: #1967d2; }
    .chip.sub { background: #e6f4ea; color: #137333; }
    .chip.pub { background: #fef7e0; color: #b06000; }

    /* カウンター（＋/－ボタン） */
    .counter {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .counter-btn {
      width: 46px;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      font-size: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .counter-btn:active {
      transform: scale(0.96); /* 押し心地の演出 */
      background: #f3f4f6;
    }

    /* 下部固定ナビゲーション */
    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 110;
      background: #fff;
      border-top: 1px solid var(--line);
      box-shadow: var(--shadow-bottom);
      /* iPhoneのホームバー（下部の線）を考慮した余白 */
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    }

    .bottom-bar-inner {
      max-width: var(--maxw);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* 保存ボタン（変更がある時に目立たせる） */
    .btn-main.dirty {
      background: var(--danger);
      box-shadow: 0 4px 12px rgba(217, 48, 37, 0.3);
    }

    /* スマホ向け微調整 */
    @media (max-width: 640px) {
      .counter-btn { width: 42px; height: 42px; }
      .btn-main { padding: 14px 20px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-top">
        <h1 class="title">在庫管理システム</h1>
        <div id="roomLabel" class="room-label"></div>
      </div>

      <div class="toolbar">
        <input
          id="searchInput"
          class="search-input"
          type="search"
          placeholder="教材名・出版社・コードで検索..."
          autocomplete="off"
        />
        <div id="filterArea" class="filter-scroll"></div>
      </div>
    </div>
  </header>

  <div class="status-line-wrap">
    <div id="statusLine" class="status-line"></div>
  </div>

  <main>
    <div id="list"></div>
  </main>

  <div class="bottom-bar">
    <div class="bottom-bar-inner">
      <div>
        <div class="summary-head">変更件数 / 合計部数</div>
        <div class="summary-body">
          <span id="changeCount" class="summary-num">0</span>
          <span class="summary-unit">件</span>
          <span class="summary-sep">|</span>
          <span id="totalQty" class="summary-num">0</span>
          <span class="summary-unit">部</span>
        </div>
      </div>

      <button id="sendBtn" class="btn-main" disabled>送信する</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
