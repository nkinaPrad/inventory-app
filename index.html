<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>在庫管理システム</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --text: #1f2937;
      --sub: #667085;
      --line: #e5e7eb;
      --line-2: #d0d5dd;
      --primary: #2563eb;
      --primary-soft: #eff6ff;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 999px;
      --maxw: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(180deg, #f7f9fc 0%, #f2f5f9 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 116px;
    }

    .shell {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 18px 18px 24px;
    }

    .top-panel {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      background: rgba(247, 249, 252, 0.88);
      border-bottom: 1px solid rgba(208, 213, 221, 0.6);
    }

    .top-panel-inner {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 14px 18px 14px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .title-block {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .title-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
      flex: 0 0 auto;
    }

    .title-texts {
      min-width: 0;
    }

    .title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: var(--sub);
    }

    .room-badge {
      flex: 0 0 auto;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 13px;
      font-weight: 800;
      border: 1px solid #bfdbfe;
    }

    .room-badge.muted {
      background: #f3f4f6;
      color: #6b7280;
      border-color: #e5e7eb;
    }

    .toolbar-card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(229, 231, 235, 0.9);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .toolbar-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 12px;
      align-items: start;
    }

    .search-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .search-input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line-2);
      border-radius: 14px;
      padding: 0 16px;
      font-size: 15px;
      outline: none;
      background: #fff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .search-input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    .filter-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .filter-scroll::-webkit-scrollbar {
      display: none;
    }

    .f-chip {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: #fff;
      color: #344054;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      transition: all 0.15s ease;
    }

    .f-chip:hover {
      border-color: #cbd5e1;
      background: #f8fafc;
    }

    .f-chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.24);
    }

    .meta-card {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      min-width: 0;
    }

    .meta-grid {
      display: grid;
      gap: 10px;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .meta-label {
      font-size: 11px;
      color: var(--sub);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .meta-value {
      font-size: 14px;
      color: var(--text);
      font-weight: 700;
      word-break: break-word;
    }

    .status-line {
      margin-top: 10px;
      font-size: 11px;
      color: var(--sub);
      text-align: right;
      min-height: 14px;
    }

    .list-wrap {
      margin-top: 18px;
    }

    #list {
      display: grid;
      gap: 12px;
    }

    .item {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
      padding: 16px 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }

    .item:hover {
      transform: translateY(-1px);
    }

    .item.has-qty {
      border-color: #bfdbfe;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.08);
    }

    .item-main {
      min-width: 0;
    }

    .item-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 800;
      line-height: 1.2;
      white-space: nowrap;
    }

    .badge-cat {
      background: #e0ecff;
      color: #1d4ed8;
    }

    .badge-sub {
      background: #e8f7ec;
      color: #137333;
    }

    .badge-pub {
      background: #fff4db;
      color: #b45309;
    }

    .item-name {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.45;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .item-code {
      font-size: 12px;
      color: var(--sub);
      font-weight: 600;
    }

    .qty-box {
      display: inline-grid;
      grid-template-columns: 48px 54px 48px;
      align-items: center;
      justify-items: center;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 16px;
      padding: 6px;
      gap: 4px;
      flex: 0 0 auto;
    }

    .qty-btn {
      width: 48px;
      height: 48px;
      border: none;
      background: #f8fafc;
      color: #111827;
      border-radius: 12px;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .qty-btn:hover {
      background: #eef2f7;
    }

    .qty-btn:active {
      transform: scale(0.96);
    }

    .qty-num {
      min-width: 54px;
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      color: #111827;
    }

    .empty {
      background: rgba(255, 255, 255, 0.9);
      border: 1px dashed var(--line-2);
      border-radius: 18px;
      text-align: center;
      color: var(--sub);
      padding: 56px 16px;
      line-height: 1.9;
      font-size: 14px;
    }

    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 60;
      padding: 14px 18px calc(14px + env(safe-area-inset-bottom));
      background: rgba(247, 249, 252, 0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(208, 213, 221, 0.7);
    }

    .bottom-inner {
      max-width: var(--maxw);
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(229, 231, 235, 0.95);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .summary-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 20px;
      align-items: center;
    }

    .summary-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .summary-label {
      font-size: 12px;
      color: var(--sub);
      font-weight: 700;
    }

    .summary-value {
      font-size: 24px;
      font-weight: 800;
      color: #111827;
      line-height: 1;
    }

    .summary-unit {
      font-size: 12px;
      color: var(--sub);
      font-weight: 700;
    }

    .btn-main {
      min-width: 168px;
      height: 52px;
      border: none;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
    }

    .btn-main:hover {
      transform: translateY(-1px);
    }

    .btn-main:disabled {
      background: #cbd5e1;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .btn-main.dirty {
      background: var(--danger);
      box-shadow: 0 12px 24px rgba(220, 38, 38, 0.2);
    }

    @media (max-width: 960px) {
      .toolbar-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .shell,
      .top-panel-inner,
      .bottom-bar {
        padding-left: 12px;
        padding-right: 12px;
      }

      .title-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .item {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .qty-box {
        justify-self: end;
      }

      .bottom-inner {
        grid-template-columns: 1fr;
      }

      .btn-main {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="top-panel">
    <div class="top-panel-inner">
      <div class="title-row">
        <div class="title-block">
          <div class="title-icon">📦</div>
          <div class="title-texts">
            <h1 class="title">在庫管理システム</h1>
            <div class="subtitle">教材の在庫を検索・入力・保存できます</div>
          </div>
        </div>

        <div id="roomLabel" class="room-badge"></div>
      </div>

      <div class="toolbar-card">
        <div class="toolbar-grid">
          <div class="search-wrap">
            <input
              id="searchInput"
              class="search-input"
              type="search"
              placeholder="教材名・出版社・コードで検索..."
              autocomplete="off"
            />
            <div id="filterArea" class="filter-scroll"></div>
          </div>

          <div class="meta-card">
            <div class="meta-grid">
              <div class="meta-item">
                <div class="meta-label">表示件数</div>
                <div id="visibleCount" class="meta-value">-</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">最終保存</div>
                <div id="updatedAt" class="meta-value">-</div>
              </div>
            </div>
          </div>
        </div>

        <div id="statusLine" class="status-line"></div>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="list-wrap">
      <div id="list"></div>
    </section>
  </main>

  <div class="bottom-bar">
    <div class="bottom-inner">
      <div class="summary-grid">
        <div class="summary-item">
          <span class="summary-label">変更件数</span>
          <span id="changeCount" class="summary-value">0</span>
          <span class="summary-unit">件</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">合計部数</span>
          <span id="totalQty" class="summary-value">0</span>
          <span class="summary-unit">部</span>
        </div>
      </div>

      <button id="sendBtn" class="btn-main" disabled>保存する</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
